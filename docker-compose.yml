version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sporthink_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-sporthink}
      MYSQL_USER: ${DB_USER:-sporthink}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sporthinkpass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema/sporthink_schema.sql:/docker-entrypoint-initdb.d/sporthink_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
